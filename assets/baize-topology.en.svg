<svg xmlns="http://www.w3.org/2000/svg" width="800" height="240" viewBox="0 0 800 240" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Baize node convergence topology</title>
  <desc id="desc">Multiple server nodes converge status, metrics, and security signals into the Baize center.</desc>
  <style>
    svg {
      color-scheme: light dark;
      --text: #64748b;
      --muted: #64748b;
      --blue: #2563eb;
      --blue-soft: #3b82f6;
      --cyan: #0891b2;
      --green: #16a34a;
      --amber: #d97706;
      --red: #dc2626;
      --orbit: rgba(37, 99, 235, 0.34);
      --orbit-soft: rgba(8, 145, 178, 0.30);
    }
    .node-label {
      font-family: "JetBrains Mono", Menlo, monospace;
      font-size: 9px;
      fill: var(--muted);
    }
    .core-label {
      font-family: Space Grotesk, Inter, Arial, sans-serif;
      font-size: 11px;
      font-weight: 700;
      fill: var(--blue);
      letter-spacing: 1.6px;
    }
    .flow {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 3 4;
    }
  </style>
  <defs>
    <radialGradient id="topologyCoreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <filter id="topologyGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <ellipse cx="400" cy="120" rx="360" ry="95" stroke="var(--orbit)" stroke-width="0.8" stroke-dasharray="6 8">
    <animate attributeName="stroke-dashoffset" values="0;-28" dur="12s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="400" cy="120" rx="240" ry="64" stroke="var(--orbit-soft)" stroke-width="0.8" stroke-dasharray="4 6">
    <animate attributeName="stroke-dashoffset" values="0;20" dur="8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="400" cy="120" rx="120" ry="34" stroke="var(--blue-soft)" stroke-opacity="0.34" stroke-width="0.9" stroke-dasharray="3 5">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="5s" repeatCount="indefinite"/>
  </ellipse>

  <path d="M80 68 Q240 75 400 120" class="flow" stroke="var(--cyan)" stroke-width="1.2" stroke-opacity="0.82">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M720 58 Q560 65 400 120" class="flow" stroke="var(--cyan)" stroke-width="1.2" stroke-opacity="0.82">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M160 180 Q280 155 400 120" class="flow" stroke="var(--blue)" stroke-width="1" stroke-opacity="0.72">
    <animate attributeName="stroke-dashoffset" values="0;-12" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M650 185 Q525 155 400 120" class="flow" stroke="var(--blue)" stroke-width="1" stroke-opacity="0.72">
    <animate attributeName="stroke-dashoffset" values="0;-12" dur="2.8s" repeatCount="indefinite"/>
  </path>
  <path d="M330 28 Q365 60 400 120" class="flow" stroke="var(--green)" stroke-width="1" stroke-opacity="0.76">
    <animate attributeName="stroke-dashoffset" values="0;-10" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M490 218 Q445 170 400 120" class="flow" stroke="var(--amber)" stroke-width="1" stroke-opacity="0.78">
    <animate attributeName="stroke-dashoffset" values="0;10" dur="2.3s" repeatCount="indefinite"/>
  </path>

  <circle cx="400" cy="120" r="48" fill="url(#topologyCoreGlow)">
    <animate attributeName="r" values="44;52;44" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.78;1;0.78" dur="4s" repeatCount="indefinite"/>
  </circle>
  <g transform="translate(400,120) scale(0.55)" opacity="0.9">
    <animate attributeName="opacity" values="0.62;1;0.62" dur="3s" repeatCount="indefinite"/>
    <path d="M0 -48 L34 -32 V0 C34 28 18 48 0 58 C-18 48 -34 28 -34 0 V-32 Z" stroke="var(--blue-soft)" stroke-width="3.5" fill="none" stroke-linejoin="round"/>
    <path d="M-17 -30 C-22 -38 -26 -46 -24 -53" stroke="var(--blue-soft)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M17 -30 C22 -38 26 -46 24 -53" stroke="var(--red)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M0 -22 V17" stroke="var(--blue-soft)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  </g>
  <text x="400" y="172" class="core-label" text-anchor="middle">Baize Core</text>

  <circle cx="80" cy="68" r="4" fill="var(--cyan)">
    <animate attributeName="opacity" values="0.45;1;0.45" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="68" r="9" stroke="var(--cyan)" stroke-width="0.6" fill="none" opacity="0.32"/>
  <text x="80" y="56" text-anchor="middle" class="node-label">web-01</text>

  <circle cx="160" cy="180" r="3.5" fill="var(--blue)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="180" r="8" stroke="var(--blue)" stroke-width="0.6" fill="none" opacity="0.28"/>
  <text x="160" y="196" text-anchor="middle" class="node-label">db-01</text>

  <circle cx="720" cy="58" r="4" fill="var(--green)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="720" cy="58" r="9" stroke="var(--green)" stroke-width="0.6" fill="none" opacity="0.32"/>
  <text x="720" y="46" text-anchor="middle" class="node-label">edge-01</text>

  <circle cx="650" cy="185" r="3.5" fill="var(--amber)">
    <animate attributeName="opacity" values="0.45;0.95;0.45" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="185" r="8" stroke="var(--amber)" stroke-width="0.6" fill="none" opacity="0.28"/>
  <text x="650" y="201" text-anchor="middle" class="node-label">web-02</text>

  <circle cx="330" cy="28" r="3" fill="var(--blue-soft)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <text x="330" y="18" text-anchor="middle" class="node-label">edge-sz</text>

  <circle cx="490" cy="218" r="3" fill="var(--cyan)">
    <animate attributeName="opacity" values="0.35;0.9;0.35" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <text x="490" y="234" text-anchor="middle" class="node-label">web-03</text>

  <circle r="2.2" fill="var(--cyan)" filter="url(#topologyGlow)">
    <animateMotion dur="3s" repeatCount="indefinite" path="M80,68 Q240,75 400,120"/>
    <animate attributeName="opacity" values="0;0.95;0.95;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="var(--cyan)" filter="url(#topologyGlow)">
    <animateMotion dur="3.5s" repeatCount="indefinite" path="M720,58 Q560,65 400,120"/>
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.8" fill="var(--blue)" filter="url(#topologyGlow)">
    <animateMotion dur="4s" repeatCount="indefinite" path="M160,180 Q280,155 400,120"/>
    <animate attributeName="opacity" values="0;0.85;0.85;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.8" fill="var(--green)" filter="url(#topologyGlow)">
    <animateMotion dur="2.8s" repeatCount="indefinite" path="M330,28 Q365,60 400,120"/>
    <animate attributeName="opacity" values="0;0.95;0.95;0" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.5" fill="var(--amber)" filter="url(#topologyGlow)">
    <animateMotion dur="3.2s" repeatCount="indefinite" path="M650,185 Q525,155 400,120"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.5" fill="var(--blue)" filter="url(#topologyGlow)">
    <animateMotion dur="2.6s" repeatCount="indefinite" path="M490,218 Q445,170 400,120"/>
    <animate attributeName="opacity" values="0;0.85;0.85;0" dur="2.6s" repeatCount="indefinite"/>
  </circle>
</svg>
