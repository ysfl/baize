<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">白泽架构图</title>
  <desc id="desc">白泽以中心服务连接 Agent 节点组、控制台与开放端，承载指标上报、任务下发、客户端接入、结果回传与审计汇入。</desc>
  <style>
    svg {
      color-scheme: light dark;
      --text: #64748b;
      --muted: #64748b;
      --line-muted: #64748b;
      --panel: rgba(100, 116, 139, 0.18);
      --card: rgba(100, 116, 139, 0.10);
      --border: rgba(100, 116, 139, 0.70);
      --grid: rgba(37, 99, 235, 0.18);
      --blue: #2563eb;
      --blue-soft: #3b82f6;
      --cyan: #0891b2;
      --green: #16a34a;
      --amber: #d97706;
      --red: #dc2626;
    }
    .title-text {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", Inter, Arial, sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.2px;
    }
    .label-text {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", Inter, Arial, sans-serif;
      font-weight: 700;
    }
    .mono-text {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", "JetBrains Mono", Menlo, monospace;
    }
    .plane {
      fill: var(--panel);
      stroke: var(--border);
      stroke-width: 1.2;
    }
    .card {
      fill: var(--card);
      stroke: var(--border);
      stroke-width: 1;
    }
    .flow-base {
      fill: none;
      stroke: var(--line-muted);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-opacity: 0.16;
      stroke-width: 7;
    }
    .flow {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.6;
      stroke-dasharray: 7 5;
    }
  </style>
  <defs>
    <pattern id="archGrid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="var(--grid)" stroke-width="1" fill="none"/>
    </pattern>
    <filter id="archGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowMetric" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9Z" fill="var(--cyan)"/>
    </marker>
    <marker id="arrowCommand" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9Z" fill="var(--red)"/>
    </marker>
    <marker id="arrowIngress" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9Z" fill="var(--blue)"/>
    </marker>
    <marker id="arrowResult" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9Z" fill="var(--green)"/>
    </marker>
    <marker id="arrowAudit" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9Z" fill="var(--amber)"/>
    </marker>
  </defs>

  <rect x="380" y="80" width="440" height="380" rx="22" class="plane" stroke="var(--blue)" stroke-opacity="0.42"/>
  <rect x="380" y="80" width="440" height="380" rx="22" fill="url(#archGrid)" opacity="0.72"/>
  <text x="600" y="68" fill="var(--blue)" class="title-text" text-anchor="middle">白泽中心服务</text>

  <rect x="412" y="108" width="376" height="44" rx="10" class="card" stroke="var(--blue)" stroke-opacity="0.52"/>
  <text x="600" y="135" fill="var(--blue)" class="label-text" font-size="13" text-anchor="middle">统一接入</text>

  <rect x="412" y="178" width="180" height="78" rx="14" class="card" stroke="var(--cyan)" stroke-opacity="0.56"/>
  <text x="502" y="210" fill="var(--cyan)" class="label-text" font-size="13" text-anchor="middle">监控与指标分析</text>
  <text x="502" y="232" fill="var(--muted)" class="mono-text" font-size="10" text-anchor="middle">metrics</text>

  <rect x="608" y="178" width="180" height="78" rx="14" class="card" stroke="var(--blue)" stroke-opacity="0.56"/>
  <text x="698" y="210" fill="var(--blue)" class="label-text" font-size="13" text-anchor="middle">管控入口</text>
  <text x="698" y="232" fill="var(--muted)" class="mono-text" font-size="10" text-anchor="middle">tasks</text>

  <rect x="412" y="282" width="180" height="78" rx="14" class="card" stroke="var(--green)" stroke-opacity="0.56"/>
  <text x="502" y="314" fill="var(--green)" class="label-text" font-size="13" text-anchor="middle">实时状态与调度</text>
  <text x="502" y="336" fill="var(--muted)" class="mono-text" font-size="10" text-anchor="middle">state</text>

  <rect x="608" y="282" width="180" height="78" rx="14" class="card" stroke="var(--amber)" stroke-opacity="0.56"/>
  <text x="698" y="314" fill="var(--amber)" class="label-text" font-size="13" text-anchor="middle">告警与审计中心</text>
  <text x="698" y="336" fill="var(--muted)" class="mono-text" font-size="10" text-anchor="middle">alerts</text>

  <rect x="412" y="392" width="376" height="44" rx="10" class="card" stroke="var(--amber)" stroke-opacity="0.52"/>
  <text x="600" y="419" fill="var(--amber)" class="label-text" font-size="12" text-anchor="middle">审计日志 &amp; 数据库 · PostgreSQL / Redis</text>

  <rect x="40" y="80" width="240" height="380" rx="22" class="plane" stroke="var(--cyan)" stroke-opacity="0.44"/>
  <text x="160" y="68" fill="var(--cyan)" class="title-text" text-anchor="middle">Agent 节点组</text>

  <g>
    <rect x="64" y="108" width="192" height="48" rx="10" class="card"/>
    <circle cx="82" cy="132" r="4" fill="var(--cyan)">
      <animate attributeName="opacity" values="1;0.42;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="98" y="128" fill="var(--text)" class="mono-text" font-size="11" font-weight="600">web-01</text>
    <text x="98" y="146" fill="var(--muted)" class="mono-text" font-size="9">应用节点</text>
  </g>
  <g>
    <rect x="64" y="172" width="192" height="48" rx="10" class="card"/>
    <circle cx="82" cy="196" r="4" fill="var(--cyan)">
      <animate attributeName="opacity" values="1;0.42;1" dur="1.85s" repeatCount="indefinite"/>
    </circle>
    <text x="98" y="192" fill="var(--text)" class="mono-text" font-size="11" font-weight="600">web-02</text>
    <text x="98" y="210" fill="var(--muted)" class="mono-text" font-size="9">应用节点</text>
  </g>
  <g>
    <rect x="64" y="236" width="192" height="48" rx="10" class="card"/>
    <circle cx="82" cy="260" r="4" fill="var(--cyan)">
      <animate attributeName="opacity" values="1;0.42;1" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <text x="98" y="256" fill="var(--text)" class="mono-text" font-size="11" font-weight="600">db-01</text>
    <text x="98" y="274" fill="var(--muted)" class="mono-text" font-size="9">数据节点</text>
  </g>
  <g>
    <rect x="64" y="300" width="192" height="48" rx="10" class="card"/>
    <circle cx="82" cy="324" r="4" fill="var(--cyan)">
      <animate attributeName="opacity" values="1;0.42;1" dur="2.35s" repeatCount="indefinite"/>
    </circle>
    <text x="98" y="320" fill="var(--text)" class="mono-text" font-size="11" font-weight="600">edge-01</text>
    <text x="98" y="338" fill="var(--muted)" class="mono-text" font-size="9">边缘节点</text>
  </g>
  <text x="160" y="438" fill="var(--muted)" class="mono-text" font-size="10" text-anchor="middle" opacity="0.82">更多节点...</text>

  <rect x="920" y="80" width="240" height="380" rx="22" class="plane" stroke="var(--blue)" stroke-opacity="0.44"/>
  <text x="1040" y="68" fill="var(--blue)" class="title-text" text-anchor="middle">控制台与开放端</text>
  <g>
    <rect x="944" y="108" width="192" height="48" rx="10" class="card"/>
    <circle cx="962" cy="132" r="3.5" fill="var(--blue)" opacity="0.95"/>
    <text x="978" y="135" fill="var(--text)" class="mono-text" font-size="11" font-weight="600">网页控制台</text>
  </g>
  <g>
    <rect x="944" y="172" width="192" height="48" rx="10" class="card"/>
    <circle cx="962" cy="196" r="3.5" fill="var(--blue)" opacity="0.95"/>
    <text x="978" y="199" fill="var(--text)" class="mono-text" font-size="11" font-weight="600">移动应用</text>
  </g>
  <g>
    <rect x="944" y="236" width="192" height="48" rx="10" class="card"/>
    <circle cx="962" cy="260" r="3.5" fill="var(--blue)" opacity="0.95"/>
    <text x="978" y="263" fill="var(--text)" class="mono-text" font-size="11" font-weight="600">开放集成</text>
  </g>
  <g>
    <rect x="944" y="300" width="192" height="48" rx="10" class="card"/>
    <circle cx="962" cy="324" r="3.5" fill="var(--blue)" opacity="0.95"/>
    <text x="978" y="327" fill="var(--text)" class="mono-text" font-size="11" font-weight="600">命令行工具</text>
  </g>

  <path d="M256 132 L412 132" class="flow-base"/>
  <path d="M256 132 L412 132" class="flow" stroke="var(--cyan)" marker-end="url(#arrowMetric)">
    <animate attributeName="stroke-dashoffset" values="0;-24" dur="1.8s" repeatCount="indefinite"/>
  </path>
  <circle r="3" fill="var(--cyan)" filter="url(#archGlow)">
    <animateMotion dur="2s" repeatCount="indefinite" path="M256,132 L412,132"/>
  </circle>
  <rect x="290" y="116" width="8" height="8" rx="2" fill="var(--cyan)" opacity="0.9"/>
  <text x="304" y="124" fill="var(--cyan)" class="mono-text" font-size="10" font-weight="700">指标上报</text>

  <path d="M412 245 Q330 245 256 245" class="flow-base"/>
  <path d="M412 245 Q330 245 256 245" class="flow" stroke="var(--red)" marker-end="url(#arrowCommand)">
    <animate attributeName="stroke-dashoffset" values="0;24" dur="2s" repeatCount="indefinite"/>
  </path>
  <circle r="3" fill="var(--red)" filter="url(#archGlow)">
    <animateMotion dur="2.2s" repeatCount="indefinite" path="M412,245 Q330,245 256,245"/>
  </circle>
  <rect x="288" y="252" width="8" height="8" rx="2" fill="var(--red)" opacity="0.9"/>
  <text x="302" y="260" fill="var(--red)" class="mono-text" font-size="10" font-weight="700">任务下发</text>

  <path d="M920 130 Q860 130 788 130" class="flow-base"/>
  <path d="M920 130 Q860 130 788 130" class="flow" stroke="var(--blue)" marker-end="url(#arrowIngress)">
    <animate attributeName="stroke-dashoffset" values="0;24" dur="1.8s" repeatCount="indefinite"/>
  </path>
  <circle r="3" fill="var(--blue)" filter="url(#archGlow)">
    <animateMotion dur="2s" repeatCount="indefinite" path="M920,130 Q860,130 788,130"/>
  </circle>
  <rect x="836" y="92" width="8" height="8" rx="2" fill="var(--blue)" opacity="0.9"/>
  <text x="850" y="100" fill="var(--blue)" class="mono-text" font-size="10" font-weight="700">客户端接入</text>

  <path d="M256 320 Q330 320 412 320" class="flow-base"/>
  <path d="M592 320 Q700 380 824 360 Q900 348 920 348" class="flow-base"/>
  <path d="M256 320 Q330 320 412 320" class="flow" stroke="var(--green)" marker-end="url(#arrowResult)">
    <animate attributeName="stroke-dashoffset" values="0;-22" dur="2.4s" repeatCount="indefinite"/>
  </path>
  <path d="M592 320 Q700 380 824 360 Q900 348 920 348" class="flow" stroke="var(--green)" marker-end="url(#arrowResult)">
    <animate attributeName="stroke-dashoffset" values="0;-22" dur="2.6s" repeatCount="indefinite"/>
  </path>
  <circle r="2.8" fill="var(--green)" filter="url(#archGlow)">
    <animateMotion dur="2.6s" repeatCount="indefinite" path="M256,320 Q330,320 412,320"/>
  </circle>
  <circle r="2.8" fill="var(--green)" filter="url(#archGlow)">
    <animateMotion dur="3s" repeatCount="indefinite" path="M592,320 Q700,380 824,360 Q900,348 920,348"/>
  </circle>
  <rect x="288" y="298" width="8" height="8" rx="2" fill="var(--green)" opacity="0.9"/>
  <text x="302" y="306" fill="var(--green)" class="mono-text" font-size="10" font-weight="700">结果回传</text>

  <path d="M698 360 L698 392" class="flow-base"/>
  <path d="M698 360 L698 392" class="flow" stroke="var(--amber)" stroke-width="2.2" stroke-dasharray="5 4" marker-end="url(#arrowAudit)">
    <animate attributeName="stroke-dashoffset" values="0;-18" dur="2s" repeatCount="indefinite"/>
  </path>
  <circle r="2.5" fill="var(--amber)" filter="url(#archGlow)">
    <animateMotion dur="1.8s" repeatCount="indefinite" path="M698,360 L698,392"/>
  </circle>
  <text x="710" y="382" fill="var(--amber)" class="mono-text" font-size="10" font-weight="700">审计汇入</text>

  <g transform="translate(120, 488)">
    <rect width="960" height="36" rx="14" class="card"/>
    <g transform="translate(24, 12)">
      <rect width="12" height="12" rx="3" fill="var(--cyan)"/>
      <text x="20" y="10" fill="var(--text)" class="mono-text" font-size="10">指标上报</text>
    </g>
    <g transform="translate(212, 12)">
      <rect width="12" height="12" rx="3" fill="var(--red)"/>
      <text x="20" y="10" fill="var(--text)" class="mono-text" font-size="10">任务下发</text>
    </g>
    <g transform="translate(400, 12)">
      <rect width="12" height="12" rx="3" fill="var(--blue)"/>
      <text x="20" y="10" fill="var(--text)" class="mono-text" font-size="10">客户端接入</text>
    </g>
    <g transform="translate(588, 12)">
      <rect width="12" height="12" rx="3" fill="var(--green)"/>
      <text x="20" y="10" fill="var(--text)" class="mono-text" font-size="10">结果回传</text>
    </g>
    <g transform="translate(776, 12)">
      <rect width="12" height="12" rx="3" fill="var(--amber)"/>
      <text x="20" y="10" fill="var(--text)" class="mono-text" font-size="10">审计汇入</text>
    </g>
  </g>
</svg>
