services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "${POSTGRES_PUBLIC_PORT:-15432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - sh
      - -c
      - >
        exec redis-server --appendonly yes
        $${REDIS_PASSWORD:+ --requirepass "$${REDIS_PASSWORD}"}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports:
      - "${REDIS_PUBLIC_PORT:-16379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli $${REDIS_PASSWORD:+-a \"$${REDIS_PASSWORD}\"} ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  server:
    image: ${BAIZE_SERVER_IMAGE:-ghcr.io/ysfl/baize-server:${BAIZE_SERVER_VERSION:-${BAIZE_VERSION:-0.1.39}}}
    platform: ${SERVER_TARGET_PLATFORM:-linux/amd64}
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_ADDR: redis:6379
      AGENT_ARTIFACT_DIR: /app/agent/dist
      AGENT_INSTALL_SCRIPT_PATH: /app/agent/dist/install.sh
      AGENT_INSTALL_POWERSHELL_PATH: /app/agent/dist/install.ps1
      BAIZE_RUNTIME_LOG_DIR: /app/data/logs/baize-server
      BAIZE_RELEASE_MANIFEST_PATH: /app/releases/manifest.env
      BAIZE_SERVER_BUILD_INFO_PATH: /app/server/dist/build-info.env
      BAIZE_AGENT_BUILD_INFO_PATH: /app/agent/dist/build-info.env
      BAIZE_LATEST_MANIFEST_URL: ${BAIZE_LATEST_MANIFEST_URL:-https://raw.githubusercontent.com/ysfl/baize/main/releases/latest.json}
      BAIZE_RELEASE_CHANGELOG_URL: ${BAIZE_RELEASE_CHANGELOG_URL:-https://raw.githubusercontent.com/ysfl/baize/main/releases/changelog.json}
      BAIZE_UPGRADE_MODE: ${BAIZE_UPGRADE_MODE:-manual}
      BAIZE_UPGRADE_COMMAND: ${BAIZE_UPGRADE_COMMAND:-}
      BAIZE_DOCKER_UPGRADE_COMMAND: ${BAIZE_DOCKER_UPGRADE_COMMAND:-}
      BAIZE_HOST_UPGRADE_COMMAND: ${BAIZE_HOST_UPGRADE_COMMAND:-}
      BAIZE_UPGRADE_RUNNER_ENABLED: ${BAIZE_UPGRADE_RUNNER_ENABLED:-false}
      BAIZE_UPGRADE_LOG_DIR: /app/data/upgrade
      BAIZE_DB_AUTO_MIGRATE: ${BAIZE_DB_AUTO_MIGRATE:-true}
    ports:
      - "${SERVER_PUBLIC_PORT:-22501}:${SERVER_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - serverdata:/app/data
      - ./runtime:/app/runtime:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${SERVER_PORT:-8080}/install.sh >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30

  web:
    image: ${BAIZE_WEB_IMAGE:-ghcr.io/ysfl/baize-web:${BAIZE_WEB_VERSION:-0.1.38}}
    profiles:
      - web
    restart: unless-stopped
    environment:
      WEB_API_BASE_URL: ${WEB_API_BASE_URL:-/api/v1}
      WEB_CONTAINER_PORT: ${WEB_CONTAINER_PORT:-8080}
      WEB_CLIENT_MAX_BODY_SIZE: ${WEB_CLIENT_MAX_BODY_SIZE:-100m}
      BAIZE_SERVER_UPSTREAM: ${BAIZE_SERVER_UPSTREAM:-server:8080}
      BAIZE_WEB_DOMAIN: ${BAIZE_WEB_DOMAIN:-}
      BAIZE_WEB_ALLOWED_HOSTS: ${BAIZE_WEB_ALLOWED_HOSTS:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${WEB_PUBLIC_PORT:-8088}:${WEB_CONTAINER_PORT:-8080}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${WEB_CONTAINER_PORT:-8080}/ >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
  redisdata:
  serverdata:
